<!doctype html>
<html>
  <head>
    <meta charset="UTF-8" />
    <style>
      * {
        margin: 0;
        padding: 0;
      }
      html,
      body {
        width: 100%;
        height: 100%;
        overflow: hidden;
        background: transparent;
      }
      body {
        position: relative;
      }
      #pet {
        position: absolute;
        inset: 0;
        width: 100%;
        height: 100%;
        /* Soft drop shadow so the pet stays visible on light backgrounds. */
        filter: drop-shadow(0 1px 2px rgba(0, 0, 0, 0.08)) drop-shadow(0 2px 6px rgba(0, 0, 0, 0.06));
      }
    </style>
  </head>
  <body>
    <object id="pet" type="image/svg+xml" data="../pet-states/idle.svg"></object>
    <script type="module" src="./petRenderer.ts"></script>
  </body>
</html>
