name: Build DMG (macOS)

on:
  workflow_dispatch:
    inputs:
      arch:
        description: 'Architecture'
        required: true
        default: 'arm64'
        type: choice
        options:
          - arm64
          - x64
          - universal

permissions:
  contents: read

jobs:
  build-macos:
    name: Build macOS DMG (${{ inputs.arch }})
    runs-on: macos-14
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Setup bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Build DMG
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          if [ "${{ inputs.arch }}" = "universal" ]; then
            node scripts/build-with-builder.js auto --mac --arm64 --x64 --publish=never
          else
            node scripts/build-with-builder.js ${{ inputs.arch }} --mac --${{ inputs.arch }} --publish=never
          fi

      - name: Find DMG
        id: find_dmg
        run: |
          DMG=$(find out -name "*.dmg" | head -1)
          echo "dmg_path=$DMG" >> $GITHUB_OUTPUT
          echo "Found: $DMG"
          if [ -z "$DMG" ]; then echo "ERROR: No DMG found"; exit 1; fi

      - name: Upload DMG
        uses: actions/upload-artifact@v4
        with:
          name: AionUI-Bianinho-${{ inputs.arch }}.dmg
          path: ${{ steps.find_dmg.outputs.dmg_path }}
          retention-days: 7
